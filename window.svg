"use client";

import { useState, useRef, useEffect } from "react";

type Message = {
  role: "user" | "assistant";
  content: string;
};

export default function Home() {
  const [messages, setMessages] = useState<Message[]>([
    { role: "assistant", content: "Hey — tell me what you've got and I'll take a quick look." },
  ]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef<HTMLDivElement>(null);
  const inputRef = useRef<HTMLTextAreaElement>(null);

  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [messages, loading]);

  const sendMessage = async () => {
    const text = input.trim();
    if (!text || loading) return;

    const newMessages: Message[] = [...messages, { role: "user", content: text }];
    setMessages(newMessages);
    setInput("");
    setLoading(true);

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: newMessages }),
      });

      const data = await res.json();

      if (data.reply) {
        setMessages([...newMessages, { role: "assistant", content: data.reply }]);
      } else {
        setMessages([...newMessages, { role: "assistant", content: "Something went wrong — try again." }]);
      }
    } catch {
      setMessages([...newMessages, { role: "assistant", content: "Something went wrong — try again." }]);
    } finally {
      setLoading(false);
      setTimeout(() => inputRef.current?.focus(), 100);
    }
  };

  const handleKey = (e: React.KeyboardEvent) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  };

  return (
    <div className="min-h-screen bg-[#0f0f0f] flex items-center justify-center p-4">
      <div
        className="w-full max-w-lg bg-[#161616] rounded-2xl border border-[#232323] flex flex-col shadow-2xl"
        style={{ height: "calc(100vh - 32px)", maxHeight: "760px" }}
      >
        {/* Header */}
        <div className="flex items-center justify-between px-5 py-4 border-b border-[#1f1f1f]">
          <div className="flex items-center gap-3">
            <div className="w-9 h-9 rounded-full bg-[#c8a96e] flex items-center justify-center text-[#111] font-bold text-sm">
              M
            </div>
            <div>
              <div className="text-[#ede8dc] font-semibold text-sm">Mike</div>
              <div className="flex items-center gap-1 mt-0.5">
                <span className="w-1.5 h-1.5 rounded-full bg-[#4caf7d] inline-block" />
                <span className="text-[#555] text-xs">HVAC Advisor</span>
              </div>
            </div>
          </div>
          <div className="text-[10px] uppercase tracking-widest text-[#555] border border-[#2d2d2d] bg-[#1c1c1c] px-2.5 py-1 rounded-full">
            Second Opinion
          </div>
        </div>

        {/* Messages */}
        <div className="flex-1 overflow-y-auto px-4 py-4 flex flex-col gap-3">
          {messages.map((m, i) => (
            <div
              key={i}
              className={`flex items-end gap-2 ${m.role === "user" ? "justify-end" : "justify-start"}`}
            >
              {m.role === "assistant" && (
                <div className="w-6 h-6 rounded-full bg-[#c8a96e] flex items-center justify-center text-[#111] font-bold text-[10px] flex-shrink-0">
                  M
                </div>
              )}
              <div
                className={`max-w-[80%] px-3.5 py-2.5 text-sm leading-relaxed ${
                  m.role === "user"
                    ? "bg-[#c8a96e] text-[#111] font-medium rounded-2xl rounded-br-sm"
                    : "bg-[#1d1d1d] border border-[#262626] text-[#ccc] rounded-2xl rounded-bl-sm"
                }`}
                style={{ fontFamily: "Georgia, serif" }}
              >
                {m.content}
              </div>
            </div>
          ))}

          {loading && (
            <div className="flex items-end gap-2 justify-start">
              <div className="w-6 h-6 rounded-full bg-[#c8a96e] flex items-center justify-center text-[#111] font-bold text-[10px] flex-shrink-0">
                M
              </div>
              <div className="bg-[#1d1d1d] border border-[#262626] rounded-2xl rounded-bl-sm px-4 py-3">
                <div className="flex gap-1 items-center h-4">
                  {[0, 1, 2].map((i) => (
                    <span
                      key={i}
                      className="w-1.5 h-1.5 bg-[#444] rounded-full animate-bounce"
                      style={{ animationDelay: `${i * 0.2}s` }}
                    />
                  ))}
                </div>
              </div>
            </div>
          )}

          <div ref={bottomRef} />
        </div>

        {/* Input */}
        <div className="px-4 py-3 border-t border-[#1e1e1e] flex gap-2 items-end">
          <textarea
            ref={inputRef}
            value={input}
            onChange={(e) => setInput(e.target.value)}
            onKeyDown={handleKey}
            placeholder="Describe your quote or situation..."
            rows={1}
            disabled={loading}
            className="flex-1 bg-[#1d1d1d] border border-[#262626] rounded-xl text-[#ccc] placeholder-[#3a3a3a] px-3.5 py-2.5 text-sm resize-none outline-none focus:border-[#353535] transition-colors"
            style={{ fontFamily: "Georgia, serif", maxHeight: "100px", overflowY: "auto" }}
          />
          <button
            onClick={sendMessage}
            disabled={!input.trim() || loading}
            className="w-10 h-10 rounded-full bg-[#c8a96e] flex items-center justify-center flex-shrink-0 transition-opacity disabled:opacity-30"
          >
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <path d="M22 2L11 13" stroke="#111" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" />
              <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="#111" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" />
            </svg>
          </button>
        </div>

        <div className="text-center text-[#333] text-[10px] tracking-wider py-2 border-t border-[#191919]">
          HVAC only · No contractor ties · Your call
        </div>
      </div>
    </div>
  );
}
